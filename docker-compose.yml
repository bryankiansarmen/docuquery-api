services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - chromadb
      - redis
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped

  chromadb-admin:
    image: fengzhichao/chromadb-admin
    environment:
      - CHROMA_SERVER_URL=http://chromadb:8000
    ports:
      - "8082:3001"
    depends_on:
      - chromadb
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  worker:
    build: .
    command: python -m app.worker
    env_file:
      - .env
    depends_on:
      - redis
      - chromadb
      - mongodb
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - DOCUQUERY_API_URL=http://docuquery-api:8000
    depends_on:
      - redis
      - api
    restart: unless-stopped

volumes:
  chromadb_data:
  redis_data:
  mongo_data:
