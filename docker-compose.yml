services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000
    env_file:
      - .env
    depends_on:
      - chromadb
      - redis

  chromadb:
    image: chromadb/chroma
    ports:
      - "8001:8000"

  chromadb-admin:
    image: fengzhichao/chromadb-admin
    environment:
      - CHROMA_SERVER_URL=http://chromadb:8000
    ports:
      - "8082:3001"
    depends_on:
      - chromadb

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
